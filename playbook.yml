---
- name: Ansible RBAC Playbook
  hosts: localhost
  gather_facts: false
  vars_files:
    - ./vars/enterprise-rbac.yml
  vars:
    controller_hostname_raw: >-
      {{
        (aap_hostname | default('', true) | trim)
        or
        (lookup('env', 'CONTROLLER_HOST') | default('', true) | trim)
      }}
    controller_hostname: >-
      {{
        (
          controller_hostname_raw
          if controller_hostname_raw is match('^https?://')
          else 'https://' ~ controller_hostname_raw
        )
        | regex_replace('/+$', '')
      }}
    controller_token: >-
      {{
        (aap_token | default('', true) | trim)
        or
        (lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default('', true) | trim)
      }}
    controller_validate_certs: >-
      {{
        (aap_validate_certs | default(lookup('env', 'CONTROLLER_VERIFY_SSL'), true))
        | default(true)
        | bool
      }}
    rbac_default_password: >-
      {{
        (aap_user_password | default('', true) | trim)
        or
        (lookup('env', 'RBAC_DEFAULT_PASSWORD') | default('', true) | trim)
      }}

  tasks:
    - name: "Validate AAP connection settings"
      ansible.builtin.assert:
        that:
          - controller_hostname_raw | length > 0
          - controller_hostname is match('^https?://[^/]+$')
          - controller_token | length > 0
        fail_msg: >-
          Provide controller connection values either as env vars
          (CONTROLLER_HOST, CONTROLLER_OAUTH_TOKEN) or as extra vars
          (aap_hostname, aap_token).
          Host must be a hostname or full URL, for example:
          controller.example.com or https://controller.example.com

    - name: "Create org"
      ansible.platform.organization:
        name: "{{ rbac_config.organization.name }}"
        description: "{{ rbac_config.organization.description }}"
        aap_hostname: "{{ controller_hostname }}"
        aap_token: "{{ controller_token }}"
        aap_validate_certs: "{{ controller_validate_certs }}"

    - name: "Create Team"
      ansible.platform.team:
        name: "{{ item.name }}"
        organization: "{{ rbac_config.organization.name }}"
        description: "{{ item.description }}"
        state: present
        aap_hostname: "{{ controller_hostname }}"
        aap_token: "{{ controller_token }}"
        aap_validate_certs: "{{ controller_validate_certs }}"
      loop: "{{ rbac_config.teams | default([]) }}"

    - name: "Validate user passwords are provided"
      ansible.builtin.assert:
        that:
          - (item.password | default(rbac_default_password, true) | string | trim | length) > 0
        fail_msg: >-
          Password not provided for user {{ item.username }}.
          Set per-user password in vars file, or provide aap_user_password extra var,
          or set RBAC_DEFAULT_PASSWORD environment variable.
      loop: "{{ rbac_config.users | default([]) }}"
      no_log: true

    - name: "Create User"
      ansible.platform.user:
        username: "{{ item.username }}"
        password: "{{ item.password | default(rbac_default_password, true) }}"
        email: "{{ item.email }}"
        first_name: "{{ item.first_name }}"
        last_name: "{{ item.last_name }}"
        is_superuser: false
        state: present
        aap_hostname: "{{ controller_hostname }}"
        aap_token: "{{ controller_token }}"
        aap_validate_certs: "{{ controller_validate_certs }}"
      loop: "{{ rbac_config.users | default([]) }}"
      register: users_results
      no_log: true

    - name: "Assign User to Team"
      ansible.platform.role_user_assignment:
        role_definition: "Team Member"
        user: "{{ item.username }}"
        object_ids: "{{ item.teams | default([]) }}"
        state: present
        aap_hostname: "{{ controller_hostname }}"
        aap_token: "{{ controller_token }}"
        aap_validate_certs: "{{ controller_validate_certs }}"
      loop: "{{ rbac_config.users | default([]) }}"

    - name: "Assign Additional Role to User"
      ansible.platform.role_user_assignment:
        role_definition: "{{ item.1.role }}"
        user: "{{ item.0.username }}"
        object_ids:
          - "{{ item.1.scope }}"
        state: present
        aap_hostname: "{{ controller_hostname }}"
        aap_token: "{{ controller_token }}"
        aap_validate_certs: "{{ controller_validate_certs }}"
      loop: "{{ rbac_config.users | default([]) | subelements('roles', skip_missing=True) }}"
