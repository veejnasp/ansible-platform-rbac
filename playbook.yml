---
- name: Ansible RBAC Playbook
  hosts: localhost
  gather_facts: false
  vars_files:
    - ./vars/enterprise-rbac.yml
  vars:
    aap_hostname_raw: "{{ lookup('env', 'CONTROLLER_HOST') | default('', true) | trim }}"
    aap_hostname: >-
      {{
        (
          aap_hostname_raw
          if aap_hostname_raw is match('^https?://')
          else 'https://' ~ aap_hostname_raw
        )
        | regex_replace('/+$', '')
      }}
    aap_token: "{{ lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default('', true) | trim }}"
    aap_validate_certs: "{{ lookup('env', 'CONTROLLER_VERIFY_SSL') | default(true) | bool }}"

  tasks:
    - name: "Validate AAP connection settings"
      ansible.builtin.assert:
        that:
          - aap_hostname_raw | length > 0
          - aap_hostname is match('^https?://[^/]+$')
          - aap_token | length > 0
        fail_msg: >-
          CONTROLLER_HOST and CONTROLLER_OAUTH_TOKEN must be set.
          CONTROLLER_HOST must be a hostname or full URL, for example:
          controller.example.com or https://controller.example.com

    - name: "Create org"
      ansible.platform.organization:
        name: "{{ rbac_config.organization.name }}"
        description: "{{ rbac_config.organization.description }}"
        aap_hostname: "{{ aap_hostname }}"
        aap_token: "{{ aap_token }}"
        aap_validate_certs: "{{ aap_validate_certs }}"

    - name: "Create Team"
      ansible.platform.team:
        name: "{{ item.name }}"
        organization: "{{ rbac_config.organization.name }}"
        description: "{{ item.description }}"
        state: present
        aap_hostname: "{{ aap_hostname }}"
        aap_token: "{{ aap_token }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ rbac_config.teams | default([]) }}"

    - name: "Create User"
      ansible.platform.user:
        username: "{{ item.username }}"
        password: "{{ item.password }}"
        email: "{{ item.email }}"
        first_name: "{{ item.first_name }}"
        last_name: "{{ item.last_name }}"
        is_superuser: false
        state: present
        aap_hostname: "{{ aap_hostname }}"
        aap_token: "{{ aap_token }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ rbac_config.users | default([]) }}"
      register: users_results

    - name: "Assign User to Team"
      ansible.platform.role_user_assignment:
        role_definition: "Team Member"
        user: "{{ item.username }}"
        object_ids: "{{ item.teams | default([]) }}"
        state: present
        aap_hostname: "{{ aap_hostname }}"
        aap_token: "{{ aap_token }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ rbac_config.users | default([]) }}"

    - name: "Assign Additional Role to User"
      ansible.platform.role_user_assignment:
        role_definition: "{{ item.1.role }}"
        user: "{{ item.0.username }}"
        object_ids:
          - "{{ item.1.scope }}"
        state: present
        aap_hostname: "{{ aap_hostname }}"
        aap_token: "{{ aap_token }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ rbac_config.users | default([]) | subelements('roles', skip_missing=True) }}"
